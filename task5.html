    <script>
 // Implement a program that takes 3 users  inputs from the terminal or the Browser, and stores them in three variables. 
        // Return the largest of the three. Do this without using the the inbuilt max () function!
        // The goal of this exercise is to think about some internals that programs normally take care of for us.

        let x = Number(prompt("Enter a random number"))
        let y = Number(prompt("Enter a random number"))
        let z = Number(prompt("Enter a random number"))

        let lg;
        if (x >= y && x >= z) {
            lg = "x is the largest"
        } else if (y >= x && y >= z) {
            lg = "y is the largest"
        } else {
            lg = "z is the largest"
        }
        console.log(lg)



    </script>
